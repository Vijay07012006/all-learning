<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Image Hover Zoom</title>

    <style>
        /* Center the profile image */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            margin: 0;
        }

        /* Image wrapper (important for overflow control) */
        .profile-img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ddd;
        }

        /* Actual image */
        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        /* Hover zoom effect */
        .profile-img:hover img {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <div class="profile-img">
        <img src="https://i.pravatar.cc/300" alt="Profile Image">
    </div>

</body>
</html>
