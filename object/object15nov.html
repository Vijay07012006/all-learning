        // // spread operator(...)-> takes an array or object and spreads its elements into individual elements

        // // assign method-> used to copy the values of all enumerable own properties from one or more source objects to a target object. It returns the target object.
        
        const target = { a: 1, b: 2 };
        const source = { b: 4, c: 5 };
        const returnedTarget = Object.assign(target, source);
        console.log(target); // { a: 1, b: 4, c: 5 }
        console.log(returnedTarget); // { a: 1, b    : 4, c: 5 } 

        const a = {
            name : "Alice",
            age  : 25,
            branch : "CSE",
        };
        let b = Object.assign({}, a); // copying object a to b
        console.log(b);
        console.table(b);

        let c = Object.entries(a); // converting object a to array of key-value pairs
        console.log(c); 
        console.table(c);

        let d = Object.keys(a); // getting keys of object a
        console.log(d);
        console.table(d);

        let e = Object.values(a); // getting values of object a
        console.log(e);
        console.table(e);

        let f = Object.hasOwn(a, "name"); // checking if object a has property "name"
        console.log(f); // true

        let g = Object.create(a); // creating a new object g with prototype a
        console.log(g);

        let h = Object.freeze(a); // freezing object a
        a.age = 30; // this will not work as object a is frozen
        console.log(a);

        let i = Object.seal(a); // sealing object a
        delete a.branch; // this will not work as object a is sealed
        console.log(a);

        let j = Object.isFrozen(a); // checking if object a is frozen
        console.log(j); // true
