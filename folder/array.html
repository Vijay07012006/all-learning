        //QUESTION BANK PRACTICE
        let name = prompt("Apna naam likho:");
        name = name.trim(); // extra space hata do

        let parts = name.split(" "); // naam ko space ke basis pe tod do

        if (parts.length === 1) {
            // agar sirf ek naam hai
            console.log(parts[0]);
        }
        else if (parts.length === 2) {
            // agar do naam hai
            let first = parts[0][0].toUpperCase(); // pehla letter bada
            let last = parts[1].toLowerCase(); // last naam chhota
            console.log(first + "." + last);
        }
        else if (parts.length > 2) {
            // agar teen ya usse zyada naam hai
            let result = "";
            for (let i = 0; i < parts.length - 1; i++) {
                result += parts[i][0].toUpperCase() + ".";  // har naam ka pehla letter bada aur dot lagao
            }
            result += parts[parts.length - 1].toLowerCase(); // last naam full
            console.log(result);
        }
        else {
            console.log("Sahi naam likho!");
        }
