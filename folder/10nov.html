        //Q14. WAP to find strong number in a given range.
        
        let low = parseInt(window.prompt("Enter lower range: "));
        let high = parseInt(window.prompt("Enter higher range: "));

        for (let i = low; i <= high; i++) {
            let num = i;     
            let sum = 0;      

            while (num > 0) {
                let d = num % 10;
                let fact = 1;      

                for (let j = 1; j <= d; j++) {
                    fact = fact * j;
                }
                sum = sum + fact;
                num = parseInt(num / 10);
            }
            if (sum === i) {
                console.log(i + " is a strong number");
            }
        }
