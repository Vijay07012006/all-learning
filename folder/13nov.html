<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = ()=>{   //arrow function
            console.log("Arrow function called");
        }
        // a(); 
        function fun(b){ //parameter
            b();
            console.log("Higher order function");
        }
        fun(a); //argument
    </script>
</body>
</html>
