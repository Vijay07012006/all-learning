    //truthy and false using switch case
let values = [0, 1, "", "hello", null, [], {}, NaN, undefined];

for (let v of values) {
  switch (!!v) {
    case true:
      console.log(v, "=> Truthy");
      break;
    case false:
      console.log(v, "=> Falsy");
      break;
  }
}
