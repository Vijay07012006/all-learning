        //  Home Work
        //  1.WAP to count vowels and consonants.
        let str = prompt("Enter a string: ");
        let vowels=0;
        let consonants=0;
        for(let i=0;i<str.length;i++){
            let ch = str[i].toLowerCase();
            if(ch>='a' && ch<='z'){ // to check only alphabets
                if(ch=='a' || ch=='e' || ch=='i' || ch=='o' || ch=='u'){
                    vowels++;
                }
                else{
                    consonants++;
                }
            }
        }
        console.log("Vowels: "+vowels);
        console.log("Consonants: "+consonants);
        
            // 2. WAP to check string is palindrome or not.
            let str1 = prompt("Enter a string: ");
            let rev="";
            for(let i=str1.length-1;i>=0;i--){
                rev+=str1[i];
            }
            if(str1==rev){
                console.log("Palindrome");
            }
            else{
                console.log("Not Palindrome");
            }

            // 3.WAP to count the characters , special characters and digits.
            let str2 = prompt("Enter a string: ");
            let characters=0;
            let digits=0;
            let specialChar=0;
            for(let i=0;i<str2.length;i++){
                let ch = str2[i];
                if((ch>='a' && ch<='z') || (ch>='A' && ch<='Z')){
                    characters++;
                }
                else if(ch>='0' && ch<='9'){
                    digits++;       
                }
                else{
                    specialChar++;
                }
            }
            console.log("Characters: "+characters);
            console.log("Digits: "+digits);
            console.log("Special Characters: "+specialChar);
