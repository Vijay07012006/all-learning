<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Strength Checker</title>
  <style>
    .weak {
      color: red;
    }
    .medium {
      color: orange;
    }
    .strong {
      color: green;
    }
  </style>
</head>
<body>
  <h2>Password Strength Checker</h2>

  <form id="passwordForm">
    <label for="password">Enter Password:</label>
    <input type="password" id="password" placeholder="Type your password..." />

    <p>
      Strength: 
      <span id="strengthText">None</span>
    </p>

    <button type="submit">Submit</button>
  </form>

  <script>
    const passwordInput = document.getElementById("password");
    const strengthText = document.getElementById("strengthText");
    const form = document.getElementById("passwordForm");

    // Regex patterns
    const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&_])[A-Za-z\d@$!%*?&_]{8,}$/;
    const mediumRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*?&_]{6,}$/;
    // weak: jo in dono mein nahi aata but length >=1

    // Live check on typing
    passwordInput.addEventListener("input", function () {
      const pwd = passwordInput.value;

      // Pehle classes reset karo
      strengthText.classList.remove("weak", "medium", "strong");

      if (pwd.length === 0) {
        strengthText.textContent = "None";
        return;
      }

      if (strongRegex.test(pwd)) {
        strengthText.textContent = "Strong";
        strengthText.classList.add("strong");
      } else if (mediumRegex.test(pwd)) {
        strengthText.textContent = "Medium";
        strengthText.classList.add("medium");
      } else {
        strengthText.textContent = "Weak";
        strengthText.classList.add("weak");
      }
    });

    // Form submit pe just alert
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Password strength: " + strengthText.textContent);
    });
  </script>
</body>
</html>
