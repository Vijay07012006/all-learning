<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>15 Fields Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    form {
      max-width: 600px;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
    }
  </style>
</head>
<body>

  <h1>Registration Form</h1>

  <form id="registrationForm">

    <!-- 1. Full Name -->
    <div class="field">
      <label for="fullName">Full Name*</label>
      <input
        type="text"
        id="fullName"
        name="fullName"
        required
        minlength="3"
        maxlength="40"
        pattern="[A-Za-z ]+"
        placeholder="e.g. Vijay Kumar"
      >
    </div>

    <!-- 2. Username -->
    <div class="field">
      <label for="username">Username*</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        minlength="5"
        maxlength="15"
        pattern="[A-Za-z0-9_]+"
        placeholder="only letters, numbers, underscore"
      >
    </div>

    <!-- 3. Email -->
    <div class="field">
      <label for="email">Email*</label>
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="example@gmail.com"
      >
    </div>

    <!-- 4. Phone Number -->
    <div class="field">
      <label for="phone">Phone (Indian 10-digit)*</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        required
        minlength="10"
        maxlength="10"
        pattern="^[6-9]\d{9}$"
        placeholder="e.g. 9876543210"
      >
    </div>

    <!-- 5. Password -->
    <div class="field">
      <label for="password">
        Password* (8-20 chars, 1 uppercase, 1 lowercase, 1 digit, 1 special)
      </label>
      <input
        type="password"
        id="password"
        name="password"
        required
        minlength="8"
        maxlength="20"
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,20}"
      >
    </div>

    <!-- 6. Confirm Password -->
    <div class="field">
      <label for="confirmPassword">Confirm Password*</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        required
      >
    </div>

    <!-- 7. Age -->
    <div class="field">
      <label for="age">Age* (18 - 60)</label>
      <input
        type="number"
        id="age"
        name="age"
        required
        min="18"
        max="60"
      >
    </div>

    <!-- 8. Date of Birth -->
    <div class="field">
      <label for="dob">Date of Birth*</label>
      <input
        type="date"
        id="dob"
        name="dob"
        required
      >
    </div>

    <!-- 9. Gender -->
    <div class="field">
      <label for="gender">Gender*</label>
      <select id="gender" name="gender" required>
        <option value="">-- Select Gender --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>

    <!-- 10. Address -->
    <div class="field">
      <label for="address">Full Address*</label>
      <textarea
        id="address"
        name="address"
        rows="3"
        required
        minlength="10"
        maxlength="100"
        placeholder="House no, street, area"
      ></textarea>
    </div>

    <!-- 11. City -->
    <div class="field">
      <label for="city">City*</label>
      <input
        type="text"
        id="city"
        name="city"
        required
        minlength="2"
        maxlength="30"
        pattern="[A-Za-z ]+"
        placeholder="e.g. Mumbai"
      >
    </div>

    <!-- 12. Pincode -->
    <div class="field">
      <label for="pincode">Pincode* (6 digits)</label>
      <input
        type="text"
        id="pincode"
        name="pincode"
        required
        minlength="6"
        maxlength="6"
        pattern="^\d{6}$"
        placeholder="e.g. 400001"
      >
    </div>

    <!-- 13. Aadhaar Number -->
    <div class="field">
      <label for="aadhaar">Aadhaar Number* (12 digits)</label>
      <input
        type="text"
        id="aadhaar"
        name="aadhaar"
        required
        minlength="12"
        maxlength="12"
        pattern="^\d{12}$"
        placeholder="e.g. 123412341234"
      >
    </div>

    <!-- 14. State -->
    <div class="field">
      <label for="state">State*</label>
      <select id="state" name="state" required>
        <option value="">-- Select State --</option>
        <option value="mh">Maharashtra</option>
        <option value="dl">Delhi</option>
        <option value="up">Uttar Pradesh</option>
        <option value="gj">Gujarat</option>
        <option value="ka">Karnataka</option>
        <!-- aur bhi add kar sakte ho -->
      </select>
    </div>

    <!-- 15. Terms & Conditions -->
    <div class="field">
      <label>
        <input
          type="checkbox"
          id="terms"
          name="terms"
          required
        >
        I agree to the Terms & Conditions*
      </label>
    </div>

    <button type="submit" style="background-color: blue;color: white;padding: 5px 10px 5px 10px;border-radius: 10px;">Submit Form</button>
  </form>

  <script>
    const form = document.getElementById("registrationForm");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    // Confirm Password validation (pattern + length to HTML side already hai)
    confirmPassword.addEventListener("input", function () {
      if (confirmPassword.value !== password.value) {
        confirmPassword.setCustomValidity("Password match nahi ho raha hai.");
      } else {
        confirmPassword.setCustomValidity("");
      }
    });

    form.addEventListener("submit", function (e) {
      // Agar koi field invalid hai to submit mat hone do
      if (!form.checkValidity()) {
        e.preventDefault();
        form.reportValidity(); // Browser ka default error popup show karega
      } else {
        // Yaha pe normally form submit ho sakta hai (backend ko)
        alert("Form successfully submitted!");
      }
    });
  </script>

</body>
</html>
