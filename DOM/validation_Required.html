<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Required Validation</title>
</head>
<body>
    <form action="#" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" placeholder="Enter Name" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email"  placeholder="Enter Email" required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter Password" required>
        <br><br>
         <label for="Number">Email:</label>
        <input type="number" id="Number" placeholder="Enter Number" required>
        <br><br>
        <label for="city">Choose your city:</label>
        <select id="city" required>
           <optgroup label="Cities">
             <option >Delhi</option>
            <option >Lucknow</option>
            <option >Gurugram</option>
            <option >Basti</option>
            <option >Noida</option>
            <option >Bangulur</option>
           </optgroup>
        </select>
        <br><br>
        <section>
            <label for="textarea">Textarea:</label>
            <textarea id="textarea" rows="4" cols="30" placeholder="Write something about yourself..." required></textarea>
        </section>
        <br><br>

        <label for="gender">Gender:</label>
        <select id="gender" required>
            <option value="gender">Male</option>
            <option value="gender">Female</option>
            <option value="gender">Other</option>

        </select>
        <br><br>

        <input type="submit" value="Submit">
    </form>
    <script>

    </script>
</body>
</html>
