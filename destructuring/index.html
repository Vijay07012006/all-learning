    <script>
        // Object destructuring
        const person = {
            name: 'Alice',
            age: 30,
            city: 'New York'
        };

        const { name, age, city } = person;
        console.log(name); // Alice
        console.log(age);  // 30
        console.log(city); // New York

        // console.log(n); // Vijay

        // Array destructuring
        const numbers = [1, 2, 3, 4, 5];

        const [first, second, ...rest] = numbers;
        console.log(first);  // 1
        console.log(second); // 2
        console.log(rest);   // [3, 4, 5]
