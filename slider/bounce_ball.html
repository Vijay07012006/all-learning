<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
        }

        .ball {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ffeb3b;
            position: relative;
            animation: bounce 1s ease-in-out infinite;
            
        }

        @keyframes bounce {
            0% {
                top: 0;
            }

            50% {
                top: 200px;
                transform: scaleY(0.7);
            }

            100% {
                top: 0;
                transform: scaleY(1);
            }
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 8px solid #ddd;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        body {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .box {
            width: 100px;
            height: 100px;
            background: crimson;
            position: relative;
            margin: 50px auto;
            animation: combo 3s ease-in-out 0s infinite alternate;
        }

        @keyframes combo {
            0% {
                left: 0;
                transform: scale(1) rotate(0deg);
                background: crimson;
                border-radius: 0;
            }
            50% {
                left: 150px;
                transform: scale(1.3) rotate(45deg);
                background: orange;
                border-radius: 20px;
            }
            100% {
                left: 300px;
                transform: scale(1) rotate(90deg);
                background: limegreen;
                border-radius: 50px;
            }
        }

    </style>
</head>

<body>
    <div class="ball"></div>
    <div class="box"></div>
    <div class="loader"></div>
</body>

</html>
