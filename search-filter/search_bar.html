<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .items {
            height: 100vh;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        #srch {
            height: 40px;
            width: 300px;
            box-sizing: border-box;
            padding-left: 10px;
        }

        .box {
            width: 200px;
            height: 300px;
            font-size: 15px;
            background-color: lightcoral;
            box-sizing: border-box;
            padding: 30px 10px;
            border: 2px solid white;
        }

        .hide {
            display: none;
        }
    </style>
</head>

<body>
    <div class="ro" style="text-align: center; margin-top: 30px;">
        <input type="search" id="srch" placeholder="Search.....">
        <div class="items">
            <div class="box">C is a procedural programming language</div>
            <div class="box">Python is a very good language</div>
            <div class="box">Javascript is a client side scripting as well as programming language</div>
            <div class="box">java is a multithreading programming language</div>
        </div>
    </div>
    <script>

        let box = document.querySelectorAll('.box');
        let srch = document.getElementById('srch');
        srch.addEventListener('input', (e) => {
            // alert('hello')
            box.forEach((a , i) => {
                if(a.innerHTML.toLocaleLowerCase().includes(srch.value.toLocaleLowerCase())){
                    a.classList.remove('hide');
                }
                else{
                    a.classList.add('hide')
                }

            })
        })
    </script>
</body>

</html>
