<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>TimeZone</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-11 col-sm-12 mx-auto">
                <div class="row  mt-4 rounded-5" style="height: 100%;">
                    <div class="col-md-3 col-sm-6">
                        <div class="row ">
                            <div class="box  mx-auto mt-5 p-0 m-0">
                                <img src="images/india.jpeg" title="India" alt="India" height="100%" width="100%">
                            </div>
                        </div>
                        <div class="row mx-auto py-3 timeZoneForAll">
                            <span id="timeZoneIndia"></span>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="row">
                            <div class="box  mx-auto mt-5 p-0 m-0">
                                <img src="images/america.jpeg" title="America" alt="India" height="100%" width="100%">
                            </div>
                        </div>
                        <div class="row mx-auto py-3  timeZoneForAll">
                            <span id="timeZoneAmerica"></span>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="row">
                            <div class="box  mx-auto mt-5 p-0 m-0">
                                <img src="images/dubai.jpeg" title="Dubai" alt="India" height="100%" width="100%">
                            </div>
                        </div>
                        <div class="row mx-auto py-3  timeZoneForAll">
                            <span id="timeZoneDubai"></span>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="row">
                            <div class="box  mx-auto mt-5 p-0 m-0">
                                <img src="images/aus_tralia.jpeg" title="India" alt="Australia" height="100%"
                                    width="100%">
                            </div>
                        </div>
                        <div class="row mx-auto py-3  timeZoneForAll">
                            <span id="timeZoneAustralia"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
